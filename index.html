<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>影片腳本產生器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --border: #d1d5db;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .form-grid {
      display: grid;
      gap: 14px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 6px;
      font-weight: 600;
    }

    select,
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
    }

    select:focus,
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    button {
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.2s ease;
      width: 120px;
    }

    button:hover {
      background: var(--primary-dark);
    }

    .result {
      margin-top: 20px;
      border-top: 1px solid #e5e7eb;
      padding-top: 18px;
      display: grid;
      gap: 12px;
    }

    .card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .placeholder {
      color: var(--muted);
      margin: 0;
    }

    .output {
      margin: 0;
      line-height: 1.7;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>影片腳本產生器</h1>
    <p class="subtitle">選擇場景並輸入產品名稱，一鍵生成腳本與 AI 繪圖 Prompt。</p>

    <section class="form-grid">
      <div>
        <label for="sceneSelect">影片場景</label>
        <select id="sceneSelect">
          <option value="海邊">海邊</option>
          <option value="城市">城市</option>
          <option value="森林">森林</option>
        </select>
      </div>

      <div>
        <label for="productInput">產品名稱</label>
        <input id="productInput" type="text" placeholder="例如：智慧保溫瓶" />
      </div>

      <button id="generateBtn" type="button">生成</button>
    </section>

    <section class="result" aria-live="polite">
      <article class="card">
        <h2>影片腳本</h2>
        <p id="scriptOutput" class="placeholder">尚未生成內容。</p>
      </article>

      <article class="card">
        <h2>AI 繪圖英文 Prompt</h2>
        <p id="promptOutput" class="placeholder">尚未生成內容。</p>
      </article>
    </section>
  </main>

  <script>
    const sceneSelect = document.getElementById('sceneSelect');
    const productInput = document.getElementById('productInput');
    const generateBtn = document.getElementById('generateBtn');
    const scriptOutput = document.getElementById('scriptOutput');
    const promptOutput = document.getElementById('promptOutput');

    const sceneVisualMap = {
      海邊: 'golden sunset on the beach, waves, cinematic warm light',
      城市: 'modern downtown skyline, neon reflections, dynamic urban atmosphere',
      森林: 'lush green forest, soft morning mist, natural sun rays through trees'
    };

    const sceneMoodMap = {
      海邊: '放鬆與自由',
      城市: '節奏與效率',
      森林: '純淨與平衡'
    };

    function generateScript(scene, product) {
      const mood = sceneMoodMap[scene] || '質感生活';

      return [
        `【片頭】鏡頭帶入${scene}氛圍，背景音樂慢慢升起。`,
        `【旁白】在充滿${mood}的場景中，${product}正式登場。`,
        `【產品特寫】以近景展示 ${product} 的設計細節與使用方式。`,
        `【情境示範】主角在${scene}自然地使用${product}，展現便利與質感。`,
        `【結尾 CTA】現在就體驗 ${product}，讓你的每一天更升級。`
      ].join('\n');
    }

    function generatePrompt(scene, product) {
      const sceneVisual = sceneVisualMap[scene] || 'cinematic environment';

      return `Commercial product video frame, ${product}, ${sceneVisual}, realistic style, high detail, cinematic composition, 4k, soft depth of field, professional advertising photography`;
    }

    generateBtn.addEventListener('click', () => {
      const scene = sceneSelect.value;
      const product = productInput.value.trim();

      if (!product) {
        scriptOutput.textContent = '請先輸入產品名稱再生成。';
        promptOutput.textContent = 'Please enter a product name first.';
        scriptOutput.className = 'output';
        promptOutput.className = 'output';
        return;
      }

      scriptOutput.textContent = generateScript(scene, product);
      promptOutput.textContent = generatePrompt(scene, product);
      scriptOutput.className = 'output';
      promptOutput.className = 'output';
    });
  </script>
</body>
</html>
